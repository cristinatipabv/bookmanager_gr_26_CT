
{% extends "base.html"%}

{% block title %}Books List{% endblock %}

{% block content %}
<!--    aici am scris un comment-->
        <h1>Hello, this our selection of books:</h1>
        <ul>
            {% for book in books %}
                <li>
                    {{ book.title }} - {{ book.content }}, by {{ book.author }}

                </li>
            {% endfor %}

        </ul>
{% endblock %}
