
{% extends "base.html"%}

{% block title %}Books List{% endblock %}

{% block content %}
<!--    aici am scris un comment-->
        <h1>Hello, this our selection of books:</h1>
        <ul>
            {% for book in books %}

                <li>
                    <details>
                      <summary class="book_title"  ><span>{{ book.title }}</span><span> by {{ book.author }}</span></summary>
                        <div>
                            {{book.content}}
                        </div>
                        <a href="{% url 'delete_book' book.id %}">🗑️</a>
                        <a href="{% url 'update_book' book.id %}">✍️️</a>

                    </details>

                </li>
            {% endfor %}

        </ul>
{% endblock %}
